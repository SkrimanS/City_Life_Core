name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - develop
      - 'bootstrap/**'
      - 'feature/**'
      - 'v/**'
      - 'v*'

jobs:
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
          - os: ubuntu-latest
            compiler: clang
          - os: windows-latest
            compiler: msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        id: configure
        continue-on-error: true
        run: cmake -S . -B build -DCLC_BUILD_TESTS=ON -DCLC_BUILD_EXAMPLES=ON -DCLC_BUILD_BENCHMARKS=ON 2>&1 | tee configure-output.txt
        shell: bash

      - name: Build
        id: build
        if: steps.configure.outcome == 'success'
        continue-on-error: true
        run: cmake --build build --config Release 2>&1 | tee build-output.txt
        shell: bash

      - name: Test
        id: test
        if: steps.build.outcome == 'success'
        continue-on-error: true
        run: ctest --test-dir build --output-on-failure -C Release 2>&1 | tee test-output.txt
        shell: bash

      - name: Configure shared core build
        id: configure_shared
        if: steps.test.outcome == 'success'
        continue-on-error: true
        run: cmake -S . -B build-shared -DBUILD_SHARED_LIBS=ON -DCLC_BUILD_TESTS=OFF -DCLC_BUILD_EXAMPLES=OFF -DCLC_BUILD_BENCHMARKS=OFF -DCLC_BUILD_TOOLS=OFF 2>&1 | tee configure-shared-output.txt
        shell: bash

      - name: Build shared core
        id: build_shared
        if: steps.configure_shared.outcome == 'success'
        continue-on-error: true
        run: cmake --build build-shared --config Release 2>&1 | tee build-shared-output.txt
        shell: bash

      - name: Collect validation diagnostics
        if: steps.configure.outcome != 'success' || steps.build.outcome != 'success' || steps.test.outcome != 'success' || steps.configure_shared.outcome != 'success' || steps.build_shared.outcome != 'success'
        run: |
          mkdir -p ci-diagnostics
          echo "runner_os=${{ runner.os }}" > ci-diagnostics/summary.txt
          echo "matrix_os=${{ matrix.os }}" >> ci-diagnostics/summary.txt
          echo "matrix_compiler=${{ matrix.compiler }}" >> ci-diagnostics/summary.txt
          echo "head_sha=${{ github.sha }}" >> ci-diagnostics/summary.txt
          echo "workflow_run=${{ github.run_id }}" >> ci-diagnostics/summary.txt
          echo "configure=${{ steps.configure.outcome }}" >> ci-diagnostics/summary.txt
          echo "build=${{ steps.build.outcome }}" >> ci-diagnostics/summary.txt
          echo "test=${{ steps.test.outcome }}" >> ci-diagnostics/summary.txt
          echo "configure_shared=${{ steps.configure_shared.outcome }}" >> ci-diagnostics/summary.txt
          echo "build_shared=${{ steps.build_shared.outcome }}" >> ci-diagnostics/summary.txt
          cp configure-output.txt ci-diagnostics/configure-output.txt 2>/dev/null || true
          cp build-output.txt ci-diagnostics/build-output.txt 2>/dev/null || true
          cp test-output.txt ci-diagnostics/test-output.txt 2>/dev/null || true
          cp configure-shared-output.txt ci-diagnostics/configure-shared-output.txt 2>/dev/null || true
          cp build-shared-output.txt ci-diagnostics/build-shared-output.txt 2>/dev/null || true
          if [ -d build ]; then
            find build -maxdepth 4 -type f \( -name "*.log" -o -name "LastTest.log" -o -name "CMakeOutput.log" -o -name "CMakeError.log" \) -print > ci-diagnostics/build-log-files.txt || true
            find build -maxdepth 3 -type f | sort > ci-diagnostics/build-files.txt || true
            cp build/CMakeFiles/CMakeOutput.log ci-diagnostics/CMakeOutput.log 2>/dev/null || true
            cp build/CMakeFiles/CMakeError.log ci-diagnostics/CMakeError.log 2>/dev/null || true
            cp build/Testing/Temporary/LastTest.log ci-diagnostics/LastTest.log 2>/dev/null || true
          fi
          if [ -d build-shared ]; then
            find build-shared -maxdepth 4 -type f \( -name "*.log" -o -name "CMakeOutput.log" -o -name "CMakeError.log" \) -print > ci-diagnostics/shared-build-log-files.txt || true
            find build-shared -maxdepth 3 -type f | sort > ci-diagnostics/shared-build-files.txt || true
            cp build-shared/CMakeFiles/CMakeOutput.log ci-diagnostics/shared-CMakeOutput.log 2>/dev/null || true
            cp build-shared/CMakeFiles/CMakeError.log ci-diagnostics/shared-CMakeError.log 2>/dev/null || true
          fi
        shell: bash

      - name: Upload validation diagnostics
        if: steps.configure.outcome != 'success' || steps.build.outcome != 'success' || steps.test.outcome != 'success' || steps.configure_shared.outcome != 'success' || steps.build_shared.outcome != 'success'
        uses: actions/upload-artifact@v4
        with:
          name: city-life-core-ci-diagnostics-${{ matrix.os }}-${{ matrix.compiler }}
          path: ci-diagnostics/
          if-no-files-found: warn

      - name: Stop after failed validation
        if: steps.configure.outcome != 'success' || steps.build.outcome != 'success' || steps.test.outcome != 'success' || steps.configure_shared.outcome != 'success' || steps.build_shared.outcome != 'success'
        run: exit 1

      - name: Run core benchmarks
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            ./build/Release/clc_core_benchmarks.exe | tee benchmark-output.txt
          else
            ./build/clc_core_benchmarks | tee benchmark-output.txt
          fi
        shell: bash

      - name: Upload benchmark output
        uses: actions/upload-artifact@v4
        with:
          name: city-life-core-benchmarks-${{ matrix.os }}-${{ matrix.compiler }}
          path: benchmark-output.txt
          if-no-files-found: error

      - name: Install SDK
        run: cmake --install build --config Release --prefix install-prefix

      - name: Configure installed SDK consumer
        run: cmake -S examples/find_package_consumer -B build-consumer -DCMAKE_PREFIX_PATH=${{ github.workspace }}/install-prefix

      - name: Build installed SDK consumer
        run: cmake --build build-consumer --config Release

      - name: Run installed SDK consumer
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            ./build-consumer/Release/city_life_core_consumer.exe
          else
            ./build-consumer/city_life_core_consumer
          fi
        shell: bash

      - name: Configure installed C ABI consumer
        run: cmake -S examples/c_abi_consumer -B build-c-abi-consumer -DCMAKE_PREFIX_PATH=${{ github.workspace }}/install-prefix

      - name: Build installed C ABI consumer
        run: cmake --build build-c-abi-consumer --config Release

      - name: Run installed C ABI consumer
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            ./build-c-abi-consumer/Release/city_life_core_c_abi_consumer.exe
          else
            ./build-c-abi-consumer/city_life_core_c_abi_consumer
          fi
        shell: bash

      - name: Build SDK ZIP package
        run: cpack --config build/CPackConfig.cmake -G ZIP -C Release

      - name: Generate SDK ZIP checksums
        run: cmake -E sha256sum city-life-core-sdk-*.zip > SHA256SUMS.txt
        shell: bash

      - name: Validate unpacked SDK ZIP consumer
        run: |
          mkdir extracted-sdk
          cmake -E chdir extracted-sdk cmake -E tar xf ../city-life-core-sdk-*.zip
          sdk_prefix="$(find extracted-sdk -mindepth 1 -maxdepth 1 -type d | head -n 1)"
          test -n "${sdk_prefix}"
          cmake -S examples/find_package_consumer -B build-zip-consumer -DCMAKE_PREFIX_PATH="${PWD}/${sdk_prefix}"
          cmake --build build-zip-consumer --config Release
          if [ "${{ runner.os }}" = "Windows" ]; then
            ./build-zip-consumer/Release/city_life_core_consumer.exe
          else
            ./build-zip-consumer/city_life_core_consumer
          fi
        shell: bash

      - name: Validate unpacked SDK ZIP C ABI consumer
        run: |
          sdk_prefix="$(find extracted-sdk -mindepth 1 -maxdepth 1 -type d | head -n 1)"
          test -n "${sdk_prefix}"
          cmake -S examples/c_abi_consumer -B build-zip-c-abi-consumer -DCMAKE_PREFIX_PATH="${PWD}/${sdk_prefix}"
          cmake --build build-zip-c-abi-consumer --config Release
          if [ "${{ runner.os }}" = "Windows" ]; then
            ./build-zip-c-abi-consumer/Release/city_life_core_c_abi_consumer.exe
          else
            ./build-zip-c-abi-consumer/city_life_core_c_abi_consumer
          fi
        shell: bash

      - name: Upload SDK ZIP package
        uses: actions/upload-artifact@v4
        with:
          name: city-life-core-sdk-${{ matrix.os }}-${{ matrix.compiler }}
          path: |
            city-life-core-sdk-*.zip
            SHA256SUMS.txt
          if-no-files-found: error
